    document.getElementById('overlay-title').textContent = 'Game Over';
    document.getElementById('overlay-sub').innerHTML = 'Final score <b style="color:var(--accent)">'+score+'</b>' +
      (score>=best ? '<br>new best' : '<br>best '+best);
    document.getElementById('start-btn').textContent = 'Play Again';
    overlay.classList.add('show');
  }

  // ---------- RENDER ----------
  function drawBallShape(context, b){
    const rx = b.r * (1 + b.squash*0.5);
    const ry = b.r * (1 - b.squash*0.5);
    const t = TIERS[b.tier];
    context.save();
    context.translate(b.x, b.y);
    context.beginPath();
    context.ellipse(0,0, rx, ry, 0, 0, Math.PI*2);
    const grad = context.createRadialGradient(-rx*0.3,-ry*0.35, rx*0.1, 0,0, rx*1.05);
    grad.addColorStop(0, shadeColor(t.color, 45));
    grad.addColorStop(0.4, t.color);
    grad.addColorStop(1, shadeColor(t.color, -28));
    context.fillStyle = grad;
    context.fill();
    context.lineWidth = 1.2;
    context.strokeStyle = 'rgba(255,255,255,0.15)';
    context.stroke();

    context.fillStyle = 'rgba(8,10,16,0.5)';
    context.font = '600 ' + Math.max(9, b.r*0.6) + 'px Fredoka';
    context.textAlign = 'center';
    context.textBaseline = 'middle';
    context.fillText(String(b.tier+1), 0, 1);
    context.restore();
  }

  function shadeColor(hex, percent){
    const num = parseInt(hex.slice(1),16);
    let r = (num>>16)+percent, g = ((num>>8)&0xff)+percent, b=(num&0xff)+percent;
    r = Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }

  function render(){
    ctx.clearRect(0,0,CANVAS_W,CANVAS_H);

    // danger line
    const dangerAlpha = Math.min(1, dangerTimer/DANGER_HOLD);
    ctx.strokeStyle = `rgba(220,90,90,${0.12+dangerAlpha*0.55})`;
    ctx.setLineDash([5,6]);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(WALL, DANGER_Y);
    ctx.lineTo(CANVAS_W-WALL, DANGER_Y);
    ctx.stroke();
    ctx.setLineDash([]);

    for (const p of particles){
      const a = Math.max(0, p.life/p.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const b of balls) drawBallShape(ctx, b);

    if (!gameOver){
      const r = TIERS[currentTier].r;
      const clampedX = Math.max(WALL+r, Math.min(CANVAS_W-WALL-r, dropX));
      ctx.save();
      ctx.globalAlpha = canDrop ? 0.8 : 0.3;
      ctx.setLineDash([3,5]);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.moveTo(clampedX, r+16);
      ctx.lineTo(clampedX, CANVAS_H-WALL);
      ctx.stroke();
      ctx.setLineDash([]);
      drawBallShape(ctx, { x:clampedX, y:r+16, r, tier:currentTier, squash:0 });
      ctx.restore();
    }

    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = WALL;
    ctx.strokeRect(WALL/2, WALL/2, CANVAS_W-WALL, CANVAS_H-WALL);
  }

  function drawNextPreview(){
    nctx.clearRect(0,0,76,76);
    const t = TIERS[nextTier];
    const r = Math.min(26, t.r*0.85);
    nctx.save();
    nctx.translate(38,38);
    nctx.beginPath();
    nctx.arc(0,0,r,0,Math.PI*2);
    const grad = nctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r*1.1);
    grad.addColorStop(0, shadeColor(t.color,45));
    grad.addColorStop(0.4, t.color);
    grad.addColorStop(1, shadeColor(t.color,-28));
    nctx.fillStyle = grad;
    nctx.fill();
    nctx.restore();
  }

  // ---------- LOOP ----------
  function loop(ts){
    if (lastTime === null) lastTime = ts;
    const dt = (ts-lastTime)/1000;
    lastTime = ts;
    if (running && !gameOver) step(dt);
    render();
    requestAnimationFrame(loop);
  }
